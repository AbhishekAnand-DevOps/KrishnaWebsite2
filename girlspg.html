<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girls PG | Krishna Realty</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo"><a href="index.html"><img src="assets/images/Logo.png" alt="Krishna Realty logo" class="logo-img"></a></div>
        <ul class="nav-links">
            <li><a href="buy.html">Buy</a></li>
            <li><a href="rent.html">Rent</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="boyspg.html">Boys PG</a></li>
            <li><a href="girlspg.html" class="active">Girls PG</a></li>
            <li><a href="hotel.html">Hotel</a></li>
        </ul>
        <button id="nav-menu-toggle" class="nav-menu-toggle" aria-label="Open navigation menu" aria-expanded="false">☰</button>
        <div class="nav-actions">
            <button id="theme-toggle" class="btn-icon" aria-label="Toggle Dark Mode">🌓</button>
            <button id="btn-user-login" class="btn-text">Log In</button>
            <button id="btn-post-property" class="btn-primary">Post Property</button>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <div class="page-header-overlay"></div>
        <div class="page-header-content">
            <h1 class="page-title">Girls PG</h1>
            <p class="page-subtitle">Safe and comfortable PG accommodations for girls</p>
        </div>
    </header>

    <!-- Properties Section -->
    <section class="section-padding">
        <div class="view-toggle">
            <button id="list-view-btn" class="btn-toggle active">List View</button>
            <button id="map-view-btn" class="btn-toggle">Map View</button>
        </div>
        <div class="properties-grid" id="properties-grid">
            <!-- Injected via JS -->
        </div>
        <div id="properties-map" class="properties-map hidden"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <a href="index.html" class="footer-logo"><img src="assets/images/Logo.png" alt="Krishna Realty logo"></a>
                <p>Elevating your lifestyle, one home at a time.</p>
            </div>
            <div class="footer-links">
                <a href="#">About Us</a>
                <a href="#">Contact</a>
                <a href="#">Privacy Policy</a>
            </div>
            <div class="footer-social">
                <a href="#">IG</a>
                <a href="#">TW</a>
                <a href="#">FB</a>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2026 Krishna Realty. All rights reserved<span id="admin-trigger" class="admin-trigger">-</span>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/crypto.service.js"></script>
    <script src="js/auth.service.js"></script>
    <script src="js/property.service.js"></script>
    <script src="js/state.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentProperties = [];
        let map;

        // Mock coordinates for locations
        const locationCoords = {
            'New York City, NY': [40.7128, -74.0060],
            'Los Angeles, CA': [34.0522, -118.2437],
            'Chicago, IL': [41.8781, -87.6298],
            'Houston, TX': [29.7604, -95.3698],
            'Phoenix, AZ': [33.4484, -112.0740],
            'Philadelphia, PA': [39.9526, -75.1652],
            'San Antonio, TX': [29.4241, -98.4936],
            'San Diego, CA': [32.7157, -117.1611],
            'Dallas, TX': [32.7767, -96.7970],
            'San Jose, CA': [37.3382, -121.8863],
            'Austin, TX': [30.2672, -97.7431],
            'Jacksonville, FL': [30.3322, -81.6557],
            'Fort Worth, TX': [32.7555, -97.3308],
            'Columbus, OH': [39.9612, -82.9988],
            'Charlotte, NC': [35.2271, -80.8431],
            'San Francisco, CA': [37.7749, -122.4194],
            'Indianapolis, IN': [39.7684, -86.1581],
            'Seattle, WA': [47.6062, -122.3321],
            'Denver, CO': [39.7392, -104.9903],
            'Boston, MA': [42.3601, -71.0589]
        };

        function getCoordinates(location) {
            return locationCoords[location] || [40.7128, -74.0060]; // Default to NYC
        }

        function renderListView(props) {
            const grid = document.getElementById('properties-grid');
            grid.innerHTML = props.map(prop => `
                <div class="property-card slide-up" data-id="${prop.id}">
                    <div class="property-img">
                        <img src="${prop.image}" alt="${prop.title}" onerror="this.src='assets/images/property1.png'">
                        <span class="property-badge badge-${prop.intent}">${prop.intent === 'sell' ? 'For Sale' : 'For Rent'}</span>
                    </div>
                    <div class="property-info">
                        <div class="property-price">${prop.priceFormatted}</div>
                        <h3 class="property-title">${prop.title}</h3>
                        <p class="text-muted" style="margin-bottom:1rem;">${prop.location}</p>
                        <div class="property-meta">
                            <span>🛏 ${prop.beds} Beds</span>
                            <span>🚿 ${prop.baths} Baths</span>
                            <span>📐 ${prop.area}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderMapView(props) {
            const mapContainer = document.getElementById('properties-map');
            mapContainer.classList.remove('hidden');
            
            if (map) {
                map.remove();
            }

            map = L.map('properties-map').setView([39.8283, -98.5795], 4); // Center of US

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            props.forEach(prop => {
                const coords = getCoordinates(prop.location);
                const marker = L.marker(coords).addTo(map);
                
                marker.bindPopup(`
                    <div style="max-width: 200px;">
                        <img src="${prop.image}" alt="${prop.title}" style="width: 100%; height: 100px; object-fit: cover; border-radius: 4px; margin-bottom: 8px;" onerror="this.src='assets/images/property1.png'">
                        <h4 style="margin: 0 0 4px 0; font-size: 14px;">${prop.title}</h4>
                        <p style="margin: 0 0 4px 0; color: #666; font-size: 12px;">${prop.location}</p>
                        <p style="margin: 0; font-weight: bold; color: #007bff;">${prop.priceFormatted}</p>
                    </div>
                `);
            });

            // Fit map to markers
            if (props.length > 0) {
                const group = new L.featureGroup(props.map(prop => L.marker(getCoordinates(prop.location))));
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        function switchToListView() {
            document.getElementById('list-view-btn').classList.add('active');
            document.getElementById('map-view-btn').classList.remove('active');
            document.getElementById('properties-grid').classList.remove('hidden');
            document.getElementById('properties-map').classList.add('hidden');
            renderListView(currentProperties);
        }

        function switchToMapView() {
            document.getElementById('list-view-btn').classList.remove('active');
            document.getElementById('map-view-btn').classList.add('active');
            document.getElementById('properties-grid').classList.add('hidden');
            document.getElementById('properties-map').classList.remove('hidden');
            renderMapView(currentProperties);
        }

        // Load Girls PG properties on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await KrishnaDB.open();
            await PropertyService.seedIfEmpty();
            
            const grid = document.getElementById('properties-grid');
            grid.innerHTML = '<div class="loading-spinner"></div>';
            
            const props = await PropertyService.getProperties({ type: 'Girls PG', status: 'Active' });
            currentProperties = props;
            
            if (props.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>No Girls PG properties found.</p></div>';
                return;
            }
            
            renderListView(props);

            // Setup toggle buttons
            document.getElementById('list-view-btn').addEventListener('click', switchToListView);
            document.getElementById('map-view-btn').addEventListener('click', switchToMapView);
        });
    </script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>

</html>
